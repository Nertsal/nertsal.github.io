name: Deploy pages
on: push

permissions:
  contents: write

jobs:
  deploy-pages:
    name: Deploy Github Pages
    if: github.ref == 'refs/heads/main' && github.repository_owner == 'nertsal'
    runs-on: ubuntu-latest
    container: ghcr.io/geng-engine/cargo-geng@sha256:0e57d6ddd0b82f845fc254a553d2259d21f43ae7bc2068490db6659c8ed30fbe
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up cargo cache
        uses: actions/cache@v3
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            background/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          target: wasm32-unknown-unknown
      # - name: Install WASM tools
      #   run: sudo apt-get update && sudo apt-get install binaryen
      # - name: Install cargo-geng
      #   run: cargo install cargo-geng --git https://github.com/geng-engine/cargo-geng --force --rev aa2c2242d7024734f3d5f6e5c9879a19c01b100a
      - name: Build background
        run: |
          cd background
          cargo geng build --release --platform web --out-dir target
          # wasm-opt -Os -o target/background.wasm target/background.wasm
          cd ..
          cp -r background/target/ website/static/background/
      - name: Zola Deploy
        uses: shalzz/zola-deploy-action@v0.17.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_DIR: website
